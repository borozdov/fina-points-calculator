<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена — FINA Points</title>
    <meta name="robots" content="noindex">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #101014;
            color: #e8e8ed;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
        }

        .emoji {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: #c8a2ff;
        }

        p {
            font-size: 0.9rem;
            color: #7a7a8a;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        a {
            display: inline-block;
            padding: 12px 32px;
            background: #c8a2ff;
            color: #101014;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: filter 0.2s;
        }

        a:hover {
            filter: brightness(1.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="emoji">🏊</div>
        <h1>404 — Страница не найдена</h1>
        <p>Такой страницы нет, но калькулятор очков FINA всегда доступен на главной.</p>
        <a href="/">Перейти к калькулятору</a>
    </div>
</body>

</html>
